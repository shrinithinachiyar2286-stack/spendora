<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Spendora</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
</head>

<body>
<div class="overlay">

    <div class="container py-4">
        <div class="d-flex justify-content-end mb-3">
    <button class="btn btn-danger" onclick="logout()">
        Logout
    </button>
</div>

        <h1 class="text-center text-white fw-bold mb-4">
            💰 Spendora
        </h1>

        <h2 class="text-center text-light mb-5">
            Smart Expense Tracking & Budget Management
        </h2>

        <div class="row g-4">

            <!-- Balance -->
            <div class="col-md-4">
                <div class="card glass-card">
                    <div class="card-body text-center">
                        <h5>Total Balance</h5>
                        <h2 id="balance">₹0</h2>
                    </div>
                </div>
            </div>

            <!-- Income -->
            <div class="col-md-4">
                <div class="card glass-card">
                    <div class="card-body text-center">
                        <h5>Total Income</h5>
                        <h2 id="income">₹0</h2>
                    </div>
                </div>
            </div>

            <!-- Expense -->
            <div class="col-md-4">
                <div class="card glass-card">
                    <div class="card-body text-center">
                        <h5>Total Expense</h5>
                        <h2 id="expense">₹0</h2>
                    </div>
                </div>
            </div>

        </div>
        <div class="card glass-card mt-4">
    <div class="card-body">

        <h3>📊 Monthly Budget</h3>

        <div class="input-group mb-3">

            <input
            type="number"
            id="budgetInput"
            class="form-control"
            placeholder="Enter Monthly Budget">

            <button
            class="btn btn-success"
            onclick="setBudget()">

            Save

            </button>

        </div>

        <h5>
            Budget :
            <span id="budgetAmount">₹0</span>
        </h5>

        <div class="progress mt-3" style="height:25px;">

            <div
            id="budgetBar"
            class="progress-bar bg-success"
            style="width:0%">

            0%

            </div>

        </div>

    </div>
</div>
<div class="row mt-4">

    <!-- Chart -->
    <div class="col-lg-6">

        <div class="card glass-card h-100">

            <div class="card-body">

                <h3 class="fw-bold text-white mb-4">💸 Spending by Category</h3>

                <canvas id="categoryChart"></canvas>

            </div>

        </div>

    </div>

    <!-- Add Transaction Starts Here -->
    <div class="col-lg-6">
        <!-- Add Transaction -->
        <div class="card glass-card mt-5">
            <div class="card-body">

                <h3 class="mb-3">Add Transaction</h3>

             <form id="transactionForm">

    <input type="number"
           id="amount"
           class="form-control mb-3"
           placeholder="Amount"
           required>

    <select id="type" class="form-select mb-3" required>
        <option value="">Select Type</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>
    <select id="category" class="form-select mb-3" required>

    <option value="">Select Category</option>

    <!-- Income -->
    <option value="Salary">💼 Salary</option>
    <option value="Freelance">💸 Freelance</option>

    <!-- Expense -->
    <option value="Food">🍔 Food</option>
    <option value="Travel">🚗 Travel</option>
    <option value="Shopping">🛍️ Shopping</option>
    <option value="Bills">💡 Bills</option>
    <option value="Mobile Recharge">📱 Mobile Recharge</option>
    <option value="Health">💊 Health</option>
    <option value="Education">🎓 Education</option>
    <option value="Entertainment">🎬 Entertainment</option>
    <option value="Rent">🏠 Rent</option>
    <option value="Others">🎁 Others</option>

</select>
    <input type="text"
id="description"
class="form-control mb-3"
placeholder="Enter Note (Example: Jio Recharge, KFC Lunch, June Salary)"
required>

    <button class="btn btn-primary w-100">
        Add Transaction
    </button>

</form>
</div> <!-- card-body -->
</div> <!-- card -->

</div> <!-- col-lg-6 -->

</div> <!-- row -->
<div class="card glass-card mt-4">
    <div class="card-body">
<div class="mb-3">
    <input
        type="text"
        id="search"
        class="form-control"
        placeholder="🔍 Search by Note or Category..."
        onkeyup="searchTransactions()">
</div>
        <h3>Transaction History</h3>

        <ul id="transactionList" class="list-group mt-3">
        </ul>

    </div>
    
</div>

            </div>
        </div>

    </div>

</div>
<button id="modeBtn">🌙</button>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>



</body>
</html>
